<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Website</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="#">NewsApp</a>

      <div class="collapse navbar-collapse show">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link" href="#" id="general">General</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#" id="business">Business</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#" id="sport">Sports</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#" id="technology">Technology</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#" id="entertainment">Entertainment</a>
          </li>

        </ul>

        <form class="d-flex">
          <input
            class="form-control me-2"
            type="text"
            id="newsQuery"
            placeholder="Search news"
          />
          <button
            id="searchBtn"
            class="btn btn-outline-warning"
            type="button"
          >
            Search
          </button>
        </form>

      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row" id="newsdetails"></div>
  </div>
  
  <script src="index.js"></script>

</body>
</html>
